{% extends 'erp/layout.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'companies/roles/roles.css' %}">
{% endblock %}

{% block content %}
<div class="roles-confirm">
    <h1>Confirmar Eliminación</h1>
    <p>¿Estás seguro de que deseas eliminar el rol "{{ role.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'companies:list_roles' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
