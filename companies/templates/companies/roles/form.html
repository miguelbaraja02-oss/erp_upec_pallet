{% extends 'erp/layout.html' %}
{% load static %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'companies/roles/create.css' %}">
{% endblock %}

{% block content %}
<div class="roles-form">
    <h1>{% if form.instance.pk %}Editar Rol{% else %}Crear Rol{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'companies:list_roles' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
