{% load static %}

<nav class="erp-navbar">

    <div class="navbar-left">
        {% if active_company %}
        {% if active_company.logo %}
                <img src="{{ active_company.logo.url }}" alt="Logo Empresa" class="company-avatar-img">
        {% else %}
                <div class="company-avatar-placeholder">
                <i class="fas fa-building"></i>
            </div>
        {% endif %}
            <div class="company-card">
                <span class="company-name">{{ active_company.name }}</span>
        </div>
        {% endif %}
    </div>

    <div class="navbar-right">
            <!-- Usuario y foto de perfil eliminados -->
    </div>

</nav>
