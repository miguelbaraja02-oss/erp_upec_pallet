{% load static %}

<aside class="erp-sidebar">
    <div class="sidebar-brand">
        <div class="brand-glow"></div>
        <img src="{% static 'welcome/img/strix_logo.svg' %}" alt="Strix Logo" class="sidebar-logo">
    </div>

    <nav class="sidebar-nav">
        <ul>
            <li class="nav-section">
                <span class="section-line"></span>
                <span class="section-text">General</span>
            </li>

            <li class="nav-item">
                <a href="{% url 'core:welcome' %}" class="nav-link nav-exit">
                    <div class="nav-icon">
                        <i class="fas fa-home"></i>
                    </div>
                    <span class="nav-text">Salir a inicio</span>
                    <div class="nav-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
            </li>

            <li class="nav-item">
                <div class="nav-link active">
                    <div class="nav-icon">
                        <i class="fas fa-tachometer-alt"></i>
                    </div>
                    <span class="nav-text">Dashboard</span>
                    <div class="active-indicator"></div>
                </div>
            </li>

            <li class="nav-section">
                <span class="section-line"></span>
                <span class="section-text">Operaciones</span>
            </li>

            <li class="nav-item">
                <div class="nav-link">
                    <div class="nav-icon">
                        <i class="fas fa-boxes"></i>
                    </div>
                    <span class="nav-text">Inventario</span>
                    <span class="nav-badge">12</span>
                </div>
            </li>

            <li class="nav-item">
                <div class="nav-link">
                    <div class="nav-icon">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                    <span class="nav-text">Pedidos</span>
                    <span class="nav-badge hot">3</span>
                </div>
            </li>

            <li class="nav-item">
                <div class="nav-link">
                    <div class="nav-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <span class="nav-text">Clientes</span>
                </div>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <div class="footer-glow"></div>
        <div class="user-mini">
            <div class="user-avatar">
                {% if request.user.profile.avatar %}
                    <img src="{{ request.user.profile.avatar.url }}" alt="Avatar" style="width:36px;height:36px;border-radius:0 !important;object-fit:cover;display:block;">
                {% else %}
                    <span style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:#fff;color:#111;font-size:20px;border-radius:0;"><i class="fas fa-user"></i></span>
                {% endif %}
            </div>
            <div class="user-info">
                <span class="user-name">Admin</span>
                <span class="user-role">Superusuario</span>
            </div>
        </div>
    </div>
</aside>
